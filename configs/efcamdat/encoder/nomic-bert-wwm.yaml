# nomic-bert WWM on EFCAMDAT (137M params)
model: nomic-ai/nomic-bert-2048
objective: wwm
mask_probability: 0.15
max_length: 512
flash_attention: true
seed: 42

train_file: /home/b/p/my-data/i/phd-experimental-data/cefr-classification/data/splits/norm-EFCAMDAT-ALL-CONCAT.csv
text_column: text
val_split: 0.05

per_device_train_batch_size: 32
per_device_eval_batch_size: 32
gradient_accumulation_steps: 1
num_train_epochs: 10
learning_rate: 5e-05
weight_decay: 0.01
warmup_ratio: 0.06
lr_scheduler_type: cosine
bf16: true

eval_strategy: epoch
save_strategy: epoch
save_total_limit: 3
logging_steps: 50

wandb_project: efcamdat-encoder
wandb_run_name: nomic-bert-wwm
