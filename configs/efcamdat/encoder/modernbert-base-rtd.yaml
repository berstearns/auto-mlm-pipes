# modernbert-base RTD on EFCAMDAT (149M params)
model: answerdotai/ModernBERT-base
objective: rtd
mask_probability: 0.3
max_length: 1024
generator_size_fraction: 0.25
discriminator_weight: 50.0
flash_attention: true
seed: 42

train_file: /home/b/p/my-data/i/phd-experimental-data/cefr-classification/data/splits/norm-EFCAMDAT-ALL-CONCAT.csv
text_column: text
val_split: 0.05

per_device_train_batch_size: 16
per_device_eval_batch_size: 16
gradient_accumulation_steps: 2
num_train_epochs: 10
learning_rate: 0.0001
weight_decay: 0.01
warmup_ratio: 0.06
lr_scheduler_type: cosine
bf16: true

eval_strategy: epoch
save_strategy: epoch
save_total_limit: 3
logging_steps: 50

wandb_project: efcamdat-encoder
wandb_run_name: modernbert-base-rtd
