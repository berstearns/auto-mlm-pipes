# infoxlm-large MLM on EFCAMDAT (~560M params)
model: microsoft/infoxlm-large
objective: mlm
mask_probability: 0.15
max_length: 512

seed: 42

train_file: /home/b/p/my-data/i/phd-experimental-data/cefr-classification/data/splits/norm-EFCAMDAT-ALL-CONCAT.csv
text_column: text
val_split: 0.05

per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 8
num_train_epochs: 10
learning_rate: 3e-05
weight_decay: 0.01
warmup_ratio: 0.06
lr_scheduler_type: cosine
bf16: true
gradient_checkpointing: true

eval_strategy: epoch
save_strategy: epoch
logging_steps: 50

wandb_project: efcamdat-encoder
wandb_run_name: infoxlm-large-mlm
