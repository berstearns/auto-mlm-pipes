# SPLADE dummy CPU smoke test
# Usage: python -m pipelines.train_splade --config configs/splade/dummy-cpu.yaml

model: bert-base-uncased
lambda_q: 0.0006
lambda_d: 0.0008
max_length: 32
temperature: 0.05
seed: 42

train_file: data/dummy_pairs.jsonl
val_split: 0.2

per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 1
num_train_epochs: 1
learning_rate: 5e-5
fp16: false
bf16: false

logging_steps: 1
report_to: none
