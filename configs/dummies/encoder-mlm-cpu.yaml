# Encoder dummy CPU smoke test (MLM, ~5 steps)
# Usage: python -m pipelines.train_encoder --config configs/encoder/dummy-cpu.yaml

model: bert-base-uncased
objective: mlm
mask_probability: 0.15
max_length: 32
seed: 42

train_file: data/dummy.txt
val_split: 0.2

per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 1
num_train_epochs: 1
max_steps: 5
learning_rate: 5e-5
fp16: false
bf16: false

eval_strategy: "no"
save_strategy: "no"
logging_steps: 1
report_to: none
