# BERT-base Span Corruption (T5-style)
# Usage: python -m pipelines.train_encoder --config configs/encoder/span-corruption/bert-base.yaml

model: bert-base-uncased
objective: span_corruption
mask_probability: 0.15
mean_span_length: 3.0
max_length: 512
seed: 42

train_file: data/corpus.txt
val_split: 0.1

per_device_train_batch_size: 32
per_device_eval_batch_size: 32
gradient_accumulation_steps: 1
num_train_epochs: 5
learning_rate: 5e-5
weight_decay: 0.01
warmup_ratio: 0.06
lr_scheduler_type: cosine
bf16: true

eval_strategy: epoch
save_strategy: epoch
save_total_limit: 3
logging_steps: 10

wandb_project: auto-mlm
wandb_run_name: bert-base-span-corruption
