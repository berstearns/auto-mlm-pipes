# MNTP: Convert Pythia-160m decoder to bidirectional encoder (LLM2Vec-style)
# Usage: python -m pipelines.train_encoder --config configs/encoder/mntp-pythia160m.yaml

model: EleutherAI/pythia-160m
objective: mntp
mask_probability: 0.15
max_length: 512
seed: 42

train_file: data/corpus.txt
val_split: 0.1

per_device_train_batch_size: 16
per_device_eval_batch_size: 16
gradient_accumulation_steps: 2
num_train_epochs: 3
learning_rate: 3e-5
weight_decay: 0.01
warmup_ratio: 0.06
lr_scheduler_type: cosine
bf16: true

eval_strategy: epoch
save_strategy: epoch
save_total_limit: 3
logging_steps: 10

wandb_project: auto-mlm
wandb_run_name: mntp-pythia160m
